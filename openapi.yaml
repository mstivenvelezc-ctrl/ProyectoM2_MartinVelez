openapi: 3.1.1
info:
  title: ProyectoM2_MartinVelez API
  version: 1.0.0
  description: API para gestionar usuarios y publicaciones
  contact:
    name: Martín Vélez
    email: mstivenvelezc@gmail.com

servers:
  - url: https://proyectom2martinvelez-production.up.railway.app
    description: Servidor de desarrollo
  - url: http://localhost:3000
    description: Servidor local

paths:
  /api/usuarios:
    get:
      summary: Obtener todos los usuarios
      tags:
        - Usuarios
      responses:
        '200':
          description: Lista de usuarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Usuario'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Crear un nuevo usuario
      tags:
        - Usuarios
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsuarioInput'
            example:
              name: "Ana García"
              email: "ana@example.com"
              bio: "Desarrolladora full-stack apasionada por Node.js"
      responses:
        '201':
          description: Usuario creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: El email ya está registrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/usuarios/{id}:
    get:
      summary: Obtener usuario por ID
      tags:
        - Usuarios
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      summary: Actualizar usuario por ID
      tags:
        - Usuarios
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsuarioInput'
            example:
              name: "Ana García Actualizada"
              email: "ana.nueva@example.com"
              bio: "Bio actualizada"
      responses:
        '200':
          description: Usuario actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: El email ya está registrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Eliminar usuario por ID
      tags:
        - Usuarios
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Usuario eliminado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Usuario eliminado exitosamente"
        '404':
          description: Usuario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/publicaciones:
    get:
      summary: Obtener todas las publicaciones
      tags:
        - Publicaciones
      parameters:
        - name: published
          in: query
          required: false
          schema:
            type: boolean
          description: Filtrar por estado de publicación
          example: true
      responses:
        '200':
          description: Lista de publicaciones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Publicacion'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Crear una nueva publicación
      tags:
        - Publicaciones
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublicacionInput'
            example:
              title: "Mi primera publicación"
              content: "Este es el contenido de mi primera publicación en el blog."
              usuarios_id: 1
              published: false
      responses:
        '201':
          description: Publicación creada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Publicacion'
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: El autor especificado no existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/publicaciones/{id}:
    get:
      summary: Obtener publicación por ID
      tags:
        - Publicaciones
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Publicación encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Publicacion'
        '404':
          description: Publicación no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      summary: Actualizar publicación por ID
      tags:
        - Publicaciones
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublicacionUpdateInput'
            example:
              title: "Título actualizado"
              content: "Contenido actualizado con más de 20 caracteres."
              published: true
      responses:
        '200':
          description: Publicación actualizada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Publicacion'
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Publicación no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Eliminar publicación por ID
      tags:
        - Publicaciones
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Publicación eliminada exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Publicación eliminada exitosamente"
        '404':
          description: Publicación no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/publicaciones/usuarios/{usuarioId}:
    get:
      summary: Obtener publicaciones por usuario
      tags:
        - Publicaciones
      parameters:
        - name: usuarioId
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Lista de publicaciones del usuario
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Publicacion'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/comentarios:
    get:
      summary: Obtener todos los comentarios
      tags:
        - Comentarios
      responses:
        '200':
          description: Lista de comentarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Comentario'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Crear un nuevo comentario
      tags:
        - Comentarios
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComentarioInput'
            example:
              publicacion_id: 1
              usuarios_id: 1
              content: "Este es un comentario de prueba con más de 20 caracteres."
      responses:
        '201':
          description: Comentario creado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comentario'
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: El autor o publicación especificada no existe
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/comentarios/{id}:
    get:
      summary: Obtener comentario por ID
      tags:
        - Comentarios
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Comentario encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comentario'
        '404':
          description: Comentario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      summary: Actualizar comentario por ID
      tags:
        - Comentarios
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComentarioUpdateInput'
            example:
              content: "Contenido actualizado con más de 20 caracteres."
      responses:
        '200':
          description: Comentario actualizado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Comentario'
        '400':
          description: Datos inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Comentario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Eliminar comentario por ID
      tags:
        - Comentarios
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Comentario eliminado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Comentario eliminado exitosamente"
        '404':
          description: Comentario no encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/comentarios/publicacion/{publicacionId}:
    get:
      summary: Obtener comentarios por publicación
      tags:
        - Comentarios
      parameters:
        - name: publicacionId
          in: path
          required: true
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Lista de comentarios de la publicación
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Comentario'
        '500':
          description: Error interno del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    Usuario:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Ana García"
        email:
          type: string
          example: "ana@example.com"
        bio:
          type: string
          example: "Desarrolladora full-stack apasionada por Node.js"
        created_at:
          type: string
          format: date-time
          example: "2026-04-13T12:59:26.299Z"

    UsuarioInput:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
          example: "Ana García"
        email:
          type: string
          format: email
          example: "ana@example.com"
        bio:
          type: string
          minLength: 10
          maxLength: 200
          example: "Desarrolladora full-stack apasionada por Node.js"

    Publicacion:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: "Mi primera publicación"
        content:
          type: string
          example: "Este es el contenido de mi primera publicación."
        usuarios_id:
          type: integer
          example: 1
        published:
          type: boolean
          example: false
        created_at:
          type: string
          format: date-time
          example: "2026-04-13T12:59:26.299Z"

    PublicacionInput:
      type: object
      required:
        - title
        - content
        - usuarios_id
      properties:
        title:
          type: string
          minLength: 5
          maxLength: 200
          example: "Mi primera publicación"
        content:
          type: string
          minLength: 20
          example: "Este es el contenido de mi primera publicación en el blog."
        usuarios_id:
          type: integer
          example: 1
        published:
          type: boolean
          example: false

    PublicacionUpdateInput:
      type: object
      properties:
        title:
          type: string
          minLength: 5
          maxLength: 200
          example: "Título actualizado"
        content:
          type: string
          minLength: 20
          example: "Contenido actualizado con más de 20 caracteres."
        published:
          type: boolean
          example: true

    Comentario:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: "Título del comentario"
        content:
          type: string
          example: "Este es el contenido del comentario."
        publicacion_id:
          type: integer
          example: 1
        usuarios_id:
          type: integer
          example: 1
        created_at:
          type: string
          format: date-time
          example: "2026-04-21T00:08:32.000Z"

    ComentarioInput:
      type: object
      required:
        - publicacion_id
        - usuarios_id
        - content
      properties:
        publicacion_id:
          type: integer
          example: 1
        usuarios_id:
          type: integer
          example: 1
        content:
          type: string
          minLength: 20
          example: "Este es un comentario de prueba con más de 20 caracteres."

    ComentarioUpdateInput:
      type: object
      properties:
        content:
          type: string
          minLength: 20
          example: "Contenido actualizado con más de 20 caracteres."

    Error:
      type: object
      properties:
        error:
          type: string
          example: "Mensaje de error"
        status:
          type: integer
          example: 404